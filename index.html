<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Website ExpJose Ribeiro Mendes</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>
    <h1>Website de Testes</h1>
    <p>Experiências com ferramentas, layouts e funcionalidades</p>
  </header>

  <main>

    <section class="card">
      <h2>Sobre</h2>
      <p>
        Este website serve para testar funcionalidades web,
        alojamento, formulários, galerias e integrações.
      </p>
    </section>

    <section class="card">
      <h2>Botão de Teste</h2>

      <button onclick="mostrarMensagem()">
        Clica Aqui
      </button>

      <p id="mensagem"></p>
    </section>

    <section class="card">
      <h2>Galeria</h2>

      <div class="galeria">
        <img src="https://picsum.photos/300/200?1">
        <img src="https://picsum.photos/300/200?2">
        <img src="https://picsum.photos/300/200?3">
        <img src="/fotos/Ourem Atravessar o Rio.jpg" alt="Ourem">
        <img src="/fotos/Abraçar o Rio Tomar canoas alunos.jpg" alt="Tomar">
      </div>
    </section>

  </main>

  <footer>
    <p>joseribeiromendes.online</p>
  </footer>

  <script src="script.js"></script>

</body>
</html>
